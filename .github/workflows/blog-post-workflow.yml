name: Update Profile with Latest Blogs

on:
  repository_dispatch:
    types: [blog_published]

permissions:
  contents: write 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch RSS and Update README
        run: |
          python3 -c "
          import urllib.request, xml.etree.ElementTree as ET, re
          from datetime import datetime

          url = 'https://www.ullaskunder.com/rss.xml'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          xml_data = urllib.request.urlopen(req).read()
          root = ET.fromstring(xml_data)

          posts = []
          for item in root.findall('./channel/item')[:3]:
              title = item.find('title').text
              link = item.find('link').text
              pubDate = item.find('pubDate').text
              dt = datetime.strptime(pubDate, '%a, %d %b %Y %H:%M:%S %Z')
              posts.append(f'- [{title}]({link}) · *{dt.strftime(\"%b %Y\")}*')

          posts_str = '\n'.join(posts)

          with open('README.md', 'r') as f:
              readme = f.read()

          pattern = r'(<!-- BLOG-POST-LIST:START -->\n).*?(\n<!-- BLOG-POST-LIST:END -->)'
          new_readme = re.sub(pattern, rf'\g<1>{posts_str}\g<2>', readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(new_readme)
          "

      - name: Commit and Push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: sync latest blog posts" && git push)